name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Build APK
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
      shell: bash

    - name: List APK files
      run: |
        find $GITHUB_WORKSPACE -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/ || echo "Debug dir not found"
      shell: bash

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JuPenTimer-APK
        path: |
          ${{ github.workspace }}/app/build/outputs/apk/**/*.apk
        if-no-files-found: error
