name: Android CI

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Fix gradlew and build
      run: |
        # 修复 Windows 换行符问题
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
        # 验证 gradlew
        head -5 gradlew
        # 执行构建
        ./gradlew assembleDebug --no-daemon
      shell: bash

    - name: Check build outputs
      run: |
        echo "=== Build outputs ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Directory not found"
        find . -name "*.apk" -type f 2>/dev/null

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JuPenTimer-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn
